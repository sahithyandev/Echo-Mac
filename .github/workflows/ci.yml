name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: xcodebuild -project Echo.xcodeproj -scheme Echo -configuration Debug build
      - run: xcodebuild -project Echo.xcodeproj -scheme Echo -configuration Debug test
